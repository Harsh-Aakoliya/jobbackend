# postgres related configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/review
spring.datasource.username = jobbackend
spring.datasource.password = jobbackend

spring.jpa.database = POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform = org.hibernate.dialect.PostgreSQLDialect

#Eureka client
eureka.client.register-with-eureka = true
eureka.client.fetch-registry = true
#just define where the eureka server is running
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

#zipkin
management.tracing.sampling.probability=1.0